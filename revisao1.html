<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisão de Chinês</title>
    <link rel="stylesheet" href="system.css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f5f5dc;
            --secondary: #2c2c2c;
            --tertiary: #666666;
            --box-shadow: 2px 2px 0 #2c2c2c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--primary);
            padding-top: 50px;
            font-family: "Inconsolata", Menlo, Chicago, Geneva;
        }

        /* Header Fixo */
        .header-fixed {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: var(--primary);
            border-bottom: 2px solid var(--secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            z-index: 1000;
            box-shadow: var(--box-shadow);
        }

        /* Menu Tabs */
        .menu-tabs {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .tab {
            padding: 0.5rem 1rem;
            background: var(--primary);
            border: 2px solid var(--secondary);
            border-bottom: none;
            cursor: pointer;
            font-family: "Noto Sans SC", sans-serif;
            font-size: 14px;
            box-shadow: var(--box-shadow);
        }

        .tab.active {
            background: var(--secondary);
            color: var(--primary);
        }

        .tab:hover:not(.active) {
            background: var(--tertiary);
        }

        /* Botões Direita */
        .header-buttons {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .toggle-btn {
            padding: 0.4rem 0.8rem;
            background: var(--primary);
            border: 2px solid var(--secondary);
            cursor: pointer;
            font-family: "Noto Sans SC", sans-serif;
            font-size: 12px;
            box-shadow: var(--box-shadow);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .toggle-btn.active {
            background: var(--secondary);
            color: var(--primary);
        }

        .toggle-btn:hover {
            background: var(--tertiary);
        }

        /* Conteúdo Principal */
        .content-area {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Acordeon */
        .accordion {
            margin: 1.5rem 0;
        }

        .accordion-header {
            background: var(--primary);
            border: 2px solid var(--secondary);
            padding: 1rem;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--box-shadow);
        }

        .accordion-header:hover {
            background: var(--tertiary);
        }

        .accordion-header::after {
            content: "▼";
            font-size: 0.8em;
            transition: transform 0.3s;
        }

        .accordion-header.collapsed::after {
            transform: rotate(-90deg);
        }

        .accordion-content {
            border: 2px solid var(--secondary);
            border-top: none;
            padding: 1.5rem;
            background: var(--primary);
            display: none;
        }

        .accordion-content.open {
            display: block;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .cards-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        @media (max-width: 768px) {
            .cards-grid-3 {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .cards-grid-3 {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--primary);
            border: 2px solid var(--secondary);
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--box-shadow);
            transition: all 0.2s;
        }

        .card:hover {
            background: var(--secondary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 4px 4px;
        }

        .card:hover .pinyin {
            color: var(--primary);
        }

        .card .hanzi {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 0.5rem;
            font-family: "Noto Sans SC", sans-serif;
        }

        .card .pinyin {
            font-style: italic;
            margin-bottom: 0.5rem;
            color: var(--tertiary);
        }

        .card .meaning {
            font-size: 0.9em;
        }

        .card .phrase-text {
            font-family: "Noto Sans SC", sans-serif;
            font-size: 1.1em;
            margin-bottom: 0.5rem;
        }

        .card .flag {
            font-size: 1.5em;
            margin-bottom: 0.5rem;
        }

        /* Exemplos em linha */
        .examples-inline {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0;
            justify-content: center;
        }

        .example-item {
            background: var(--primary);
            border: 1px solid var(--secondary);
            padding: 0.5rem 1rem;
            font-family: "Noto Sans SC", sans-serif;
            font-size: 1.2em;
            box-shadow: var(--box-shadow);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--primary);
            border: 3px solid var(--secondary);
            padding: 2rem;
            max-width: 600px;
            min-width: 300px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 8px 8px;
            position: relative;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--primary);
            border: 2px solid var(--secondary);
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--box-shadow);
        }

        .modal-close:hover {
            background: var(--secondary);
            color: var(--primary);
        }

        .modal-card-info {
            text-align: center;
            margin-bottom: 2rem;
        }

        .modal-card-info .hanzi {
            font-size: 4em;
            font-weight: bold;
            margin-bottom: 0.5rem;
            font-family: "Noto Sans SC", sans-serif;
        }

        .modal-card-info .pinyin {
            font-size: 1.5em;
            font-style: italic;
            margin-bottom: 0.5rem;
            color: var(--tertiary);
        }

        .modal-card-info .meaning {
            font-size: 1.2em;
        }

        /* Espaço para conteúdo futuro */
        .future-content {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px dashed var(--secondary);
        }

        .future-item {
            background: var(--primary);
            border: 1px dashed var(--secondary);
            padding: 1rem;
            margin: 0.5rem 0;
            min-height: 60px;
        }

        /* Window container */
        .window {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Ocultar pinyin */
        .hide-pinyin .pinyin {
            display: none;
        }

        .title-hanzi, .accordion-hanzi {
            font-family: "Noto Sans SC", sans-serif;
            font-weight: bold;
        }
        .title-pinyin, .accordion-pinyin {
            font-style: italic;
            color: var(--tertiary);
            margin: 0 0.5rem;
        }
        .title-pt, .accordion-pt {
            color: var(--tertiary);
            font-size: 0.9em;
        }
        .accordion-header span {
            display: inline-block;
        }

        /* Title-bar - garantir layout macOS com texto centralizado */
        .window .title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--secondary);
            padding: 0.5rem;
            border-bottom: 2px solid var(--secondary);
        }

        .window .title-bar .title {
            flex: 1;
            text-align: center;
            background: var(--primary) !important;
            padding: 0.3em 0.5em;
            margin: 0 0.5rem;
            white-space: nowrap;
            border: none;
            font-size: 14px;
        }

        .window .title-bar button {
            width: 12px;
            height: 12px;
            border: 1px solid var(--primary);
            background: var(--secondary);
            cursor: pointer;
            padding: 0;
            flex-shrink: 0;
        }

        .window .title-bar button:hover {
            background: var(--tertiary);
        }

        .window .separator {
            height: 2px;
            background: var(--secondary);
        }

        .window .window-pane {
            padding: 1rem;
            border: 2px solid var(--secondary);
            border-top: none;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 2rem;
            font-style: italic;
            color: var(--tertiary);
        }
    </style>
</head>
<body>
    <!-- Header Fixo -->
    <div class="header-fixed">
        <div class="menu-tabs">
            <div class="tab active" data-tab="expressoes">表达</div>
            <div class="tab" data-tab="pronomes">代词</div>
            <div class="tab" data-tab="verbos">动词</div>
            <div class="tab" data-tab="substantivos">名词</div>
            <div class="tab" data-tab="gramatica">语法</div>
        </div>
        <div class="header-buttons">
            <button class="toggle-btn active" id="togglePinyin">
                <span>拼音</span>
            </button>
            <button class="toggle-btn" id="toggleLang">
                <span>🇧🇷</span>
            </button>
        </div>
    </div>

    <!-- Conteúdo Principal -->
    <div class="content-area">
        <!-- Tab: Expressões -->
        <div class="tab-content active" id="expressoes">
            <div class="window">
                <div class="title-bar">
                    <button aria-label="Close" class="close"></button>
                    <h1 class="title">
                        <span class="title-hanzi">表达</span>
                        <span class="title-pinyin">biǎodá</span>
                        <span class="title-pt">Expressões</span>
                    </h1>
                    <button aria-label="Resize" class="resize"></button>
                </div>
                <div class="separator"></div>
                <div class="window-pane">
                    <div class="loading">Carregando...</div>
                </div>
            </div>
        </div>

        <!-- Tab: Pronomes -->
        <div class="tab-content" id="pronomes">
            <div class="window">
                <div class="title-bar">
                    <button aria-label="Close" class="close"></button>
                    <h1 class="title">
                        <span class="title-hanzi">代词</span>
                        <span class="title-pinyin">dàicí</span>
                        <span class="title-pt">Pronomes</span>
                    </h1>
                    <button aria-label="Resize" class="resize"></button>
                </div>
                <div class="separator"></div>
                <div class="window-pane">
                    <div class="loading">Carregando...</div>
                </div>
            </div>
        </div>

        <!-- Tab: Verbos -->
        <div class="tab-content" id="verbos">
            <div class="window">
                <div class="title-bar">
                    <button aria-label="Close" class="close"></button>
                    <h1 class="title">
                        <span class="title-hanzi">动词</span>
                        <span class="title-pinyin">dòngcí</span>
                        <span class="title-pt">Verbos</span>
                    </h1>
                    <button aria-label="Resize" class="resize"></button>
                </div>
                <div class="separator"></div>
                <div class="window-pane">
                    <div class="loading">Carregando...</div>
                </div>
            </div>
        </div>

        <!-- Tab: Substantivos -->
        <div class="tab-content" id="substantivos">
            <div class="window">
                <div class="title-bar">
                    <button aria-label="Close" class="close"></button>
                    <h1 class="title">
                        <span class="title-hanzi">名词</span>
                        <span class="title-pinyin">míngcí</span>
                        <span class="title-pt">Substantivos</span>
                    </h1>
                    <button aria-label="Resize" class="resize"></button>
                </div>
                <div class="separator"></div>
                <div class="window-pane">
                    <div class="loading">Carregando...</div>
                </div>
            </div>
        </div>

        <!-- Tab: Gramática -->
        <div class="tab-content" id="gramatica">
            <div class="window">
                <div class="title-bar">
                    <button aria-label="Close" class="close"></button>
                    <h1 class="title">
                        <span class="title-hanzi">语法</span>
                        <span class="title-pinyin">yǔfǎ</span>
                        <span class="title-pt">Gramática</span>
                    </h1>
                    <button aria-label="Resize" class="resize"></button>
                </div>
                <div class="separator"></div>
                <div class="window-pane">
                    <div class="loading">Carregando...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">×</button>
            <div class="modal-card-info" id="modalCardInfo">
                <!-- Conteúdo será preenchido via JavaScript -->
            </div>
            <div class="future-content">
                <!-- Espaço para 3 coisas futuras -->
                <div class="future-item"><!-- Exemplos de uso --></div>
                <div class="future-item"><!-- Áudio --></div>
                <div class="future-item"><!-- Notas --></div>
            </div>
        </div>
    </div>

    <!-- App Script -->
    <script src="js/app.js"></script>
</body>
</html>
